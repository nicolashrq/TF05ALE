# config/healthchecks.yml
healthchecks:
  web-frontend:
    type: http
    url: http://frontend:3000/health
    interval: 30s
    timeout: 10s
    retries: 3
    expected_status: 200
    expected_body: "OK"
    
  api-backend:
    type: http
    url: http://backend:5000/health
    interval: 15s
    timeout: 5s
    retries: 2
    expected_status: 200
    headers:
      Authorization: "Bearer health-token"
    
  database:
    type: database
    connection: "mysql://user:pass@db:3306/app"
    query: "SELECT 1"
    interval: 60s
    timeout: 30s
    retries: 5
    
  redis-cache:
    type: tcp
    host: redis
    port: 6379
    interval: 30s
    timeout: 5s
    retries: 3

alerts:
  email:
    enabled: true
    smtp_server: smtp.gmail.com
    smtp_port: 587
    username: alerts@example.com
    password: app-password
    recipients:
      - admin@example.com
      - devops@example.com
      
  webhook:
    enabled: true
    url: https://hooks.slack.com/services/xxx
    
thresholds:
  response_time:
    warning: 1000ms
    critical: 5000ms
  uptime:
    warning: 95%
    critical: 90%
  error_rate:
    warning: 5%
    critical: 10%