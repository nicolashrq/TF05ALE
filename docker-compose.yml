version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "5000:5000"
    depends_on:
      - db

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: user
      MYSQL_PASSWORD: pass